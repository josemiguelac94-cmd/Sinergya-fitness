<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Rafael - Sinergya Fitness</title>
  <style>
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      margin: 0;
      background: #0b1220;
      color: #e8eefc;
    }
    .wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 24px;
    }
    .card {
      background: #111a2e;
      border: 1px solid #1c2a4a;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
    }
    .title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #35e59d;
    }
    .chat {
      height: 60vh;
      overflow: auto;
      padding: 12px;
      border-radius: 12px;
      background: #0d1628;
      border: 1px solid #1c2a4a;
    }
    .msg {
      margin: 10px 0;
      display: flex;
    }
    .msg.user {
      justify-content: flex-end;
    }
    .bubble {
      max-width: 80%;
      padding: 12px 14px;
      border-radius: 14px;
      line-height: 1.4;
      white-space: pre-wrap;
    }
    .user .bubble {
      background: #2b6cff;
      color: white;
      border-bottom-right-radius: 6px;
    }
    .bot .bubble {
      background: #162544;
      border: 1px solid #22345c;
      border-bottom-left-radius: 6px;
    }
    .row {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }
    input {
      flex: 1;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #22345c;
      background: #0d1628;
      color: #e8eefc;
    }
    button {
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid #22345c;
      background: #142241;
      color: #e8eefc;
      cursor: pointer;
    }
    button:hover {
      background: #1a2b54;
    }
    .small {
      font-size: 12px;
      opacity: .8;
      margin-top: 8px;
    }
    .pill {
      display: inline-block;
      padding: 4px 8px;
      border: 1px solid #22345c;
      border-radius: 999px;
      background: #0d1628;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h2 class="title">
        <span class="dot"></span>
        Rafael – Gerencia Sinergya Fitness
      </h2>

      <div class="small">
        Estado: <span id="status" class="pill">listo</span>
        &nbsp;|&nbsp;
        Sesión: <span id="sid" class="pill"></span>
      </div>

      <div id="chat" class="chat"></div>

      <div class="row">
        <input id="text" placeholder="Escribe tu duda..." autocomplete="off" />
        <button id="send">Enviar</button>
      </div>

      <div class="small">
        Puedes preguntar por precios, horarios, clases o cómo apuntarte.
      </div>
    </div>
  </div>

  <script>
    // 👉 PEGA AQUÍ TU WEBHOOK DE PRODUCCIÓN
    const N8N_WEBHOOK_URL = "https://ddd-ddd-n8n.lvfzoz.easypanel.host/webhook/sinergya-demo";

    const sid = localStorage.getItem("sinergya_sid") || crypto.randomUUID();
    localStorage.setItem("sinergya_sid", sid);
    document.getElementById("sid").textContent = sid;

    const chat = document.getElementById("chat");
    const text = document.getElementById("text");
    const send = document.getElementById("send");
    const statusEl = document.getElementById("status");

    function addMessage(role, content) {
      const row = document.createElement("div");
      row.className = "msg " + (role === "user" ? "user" : "bot");
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = content;
      row.appendChild(bubble);
      chat.appendChild(row);
      chat.scrollTop = chat.scrollHeight;
    }

    async function callBot(message) {
      statusEl.textContent = "escribiendo…";
      try {
        const res = await fetch(N8N_WEBHOOK_URL, {
  method: "POST",
  headers: { "Content-Type": "application/json" },
  body: JSON.stringify({ sessionId: sid, message })
});

        if (!res.ok) throw new Error("Error HTTP");

        const data = await res.json();
        return data.reply || "Ahora mismo estoy teniendo un pequeño problema técnico. Escríbenos por WhatsApp y lo vemos al momento.";
      } catch (e) {
        return "Ahora mismo hay un problema técnico. Si quieres, puedes escribirnos directamente por WhatsApp y lo resolvemos enseguida.";
      } finally {
        statusEl.textContent = "listo";
      }
    }

    async function onSend() {
      const msg = text.value.trim();
      if (!msg) return;
      text.value = "";
      addMessage("user", msg);
      const reply = await callBot(msg);
      addMessage("bot", reply);
    }

    send.addEventListener("click", onSend);
    text.addEventListener("keydown", (e) => {
      if (e.key === "Enter") onSend();
    });

    // Mensaje inicial tipo gerente real
    addMessage("bot", 
`Soy del equipo Sinergya, ¿en qué puedo ayudarte??`
    );
  </script>
</body>
</html>
